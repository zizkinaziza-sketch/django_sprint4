{% extends "base.html" %}

{% block title %}Редактирование комментария{% endblock %}

{% block content %}
<div class="container py-5">
  <h1>Редактирование комментария</h1>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label for="{{ form.text.id_for_label }}" class="form-label">Текст комментария</label>
      {{ form.text }}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'blog:post_detail' post_id %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
